# site/ フォルダを GitHub Pages に公開するワークフロー
#
# ※注意: このリポジトリはプライベートのため、無料プランでは GitHub Pages を
#   使えません（Pages はパブリックリポジトリなら無料、プライベートは GitHub Pro 以上）。
#   そのため自動実行はせず、手動実行（workflow_dispatch）のみにしてあります。
#   無料で公開したい場合は site/README.md の Netlify Drop / Cloudflare Pages を
#   使ってください（どちらもプライベートのままでOK・無料）。
#
# GitHub Pro に加入した／リポジトリをパブリックにした場合:
#   Settings → Pages → Source を「GitHub Actions」にしてから
#   Actions タブ → このワークフロー → Run workflow で公開できます。
#   公開URL: https://mochamofu.github.io/School-SysteBalances/
name: Deploy LP to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # Pagesが未設定でも自動で有効化を試みる
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
